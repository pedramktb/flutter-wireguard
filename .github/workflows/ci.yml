name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  dart:
    name: Dart unit tests + analyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart analyze
      - run: flutter test

  linux:
    name: Linux build + native gtest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libgtest-dev cmake clang pkg-config wireguard-tools
      - run: flutter pub get
      - name: Build example (linux) + native gtest
        working-directory: example
        # The native gtest target is wired into the example app's CMake graph
        # via `include_flutter_wireguard_tests=ON`; build it through the same
        # configure step Flutter uses (apply_standard_settings is defined by
        # Flutter's Linux runner CMake wrapper, not by us).
        run: |
          flutter pub get
          flutter build linux --debug
          cmake -S linux -B build/linux/x64/debug \
                -Dinclude_flutter_wireguard_tests=ON
          cmake --build build/linux/x64/debug \
                --target flutter_wireguard_test
      - name: Run native tests
        working-directory: example
        run: ./build/linux/x64/debug/plugins/flutter_wireguard/flutter_wireguard_test

  android:
    name: Android build + Kotlin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Build example APK
        working-directory: example
        run: |
          flutter pub get
          flutter build apk --debug
      - name: Run Kotlin unit tests
        working-directory: example/android
        run: ./gradlew :flutter_wireguard:testDebugUnitTest

  windows:
    name: Windows build + native gtest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Build example (windows)
        working-directory: example
        shell: pwsh
        run: |
          flutter pub get
          flutter config --enable-windows-desktop
          flutter build windows --debug
      - name: Configure + build native gtest
        working-directory: example
        shell: pwsh
        run: |
          cmake -S windows -B build/windows/x64/debug -A x64 `
                -Dinclude_flutter_wireguard_tests=ON `
                -DFLUTTER_TARGET_PLATFORM=windows-x64
          cmake --build build/windows/x64/debug --config Debug `
                --target flutter_wireguard_test
      - name: Run native gtest
        working-directory: example
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter flutter_wireguard_test.exe `
                  -Path build/windows/x64/debug | Select-Object -First 1
          if (-not $exe) { throw "test binary not found" }
          & $exe.FullName --gtest_color=yes
