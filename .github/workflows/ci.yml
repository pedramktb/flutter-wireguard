name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dart:
    name: Dart unit tests + analyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart analyze
      - run: flutter test

  linux:
    name: Linux build + native gtest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libgtest-dev cmake clang pkg-config wireguard-tools
      - run: flutter pub get
      - name: Build example (linux)
        working-directory: example
        run: |
          flutter pub get
          flutter build linux --debug
      - name: Configure native tests
        run: cmake -S linux -B linux/build -Dinclude_flutter_wireguard_tests=ON
      - name: Build native tests
        run: cmake --build linux/build
      - name: Run native tests
        run: ctest --test-dir linux/build --output-on-failure

  android:
    name: Android build + Kotlin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Build example APK
        working-directory: example
        run: |
          flutter pub get
          flutter build apk --debug
      - name: Run Kotlin unit tests
        working-directory: example/android
        run: ./gradlew :flutter_wireguard:testDebugUnitTest
