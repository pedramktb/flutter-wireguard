# Publishes flutter_wireguard to pub.dev when a version tag is pushed.
#
# Setup (one-time, on pub.dev):
#   1. Sign in to https://pub.dev/packages/flutter_wireguard/admin
#   2. Under "Automated publishing", enable GitHub Actions and set:
#        Repository:       pedramktb/flutter-wireguard
#        Tag pattern:      v{{version}}
#   3. pub.dev will then trust OIDC tokens from this workflow.
#
# Release flow:
#   - `version:` in pubspec.yaml stays at the `0.0.0` placeholder; this
#     workflow rewrites it from the git tag at publish time.
#   - Create a GitHub Release for tag vX.Y.Z (e.g.
#     `gh release create vX.Y.Z --generate-notes`). Pushing the tag
#     triggers this workflow.
#   - The workflow rewrites pubspec's `version:` to the tag, generates
#     CHANGELOG.md from the GitHub Releases (pub.dev requires the file
#     to ship in the published archive) and then runs `flutter pub
#     publish` using OIDC -- no long-lived PUB_DEV_PUBLISH_TOKEN secret
#     is needed.
#
# Reference: https://dart.dev/tools/pub/automated-publishing
name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for pub.dev
      contents: read    # checkout
    steps:
      - uses: actions/checkout@v4

      - name: Set pubspec version from tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          # Sanity check the tag matches semver (the workflow trigger already
          # constrains the shape, but be defensive against pre-release tags
          # we might add later).
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([+-].+)?$'; then
            echo "::error::Tag $TAG does not parse as a semver version"
            exit 1
          fi
          # Replace the `version:` line in-place. pubspec.yaml ships with a
          # 0.0.0 placeholder so this is the only spot that ever needs editing.
          sed -i -E "s/^version:[[:space:]]*[^[:space:]#]+(.*)$/version: ${version}\1/" pubspec.yaml
          echo "----- pubspec.yaml after version rewrite -----"
          grep '^version:' pubspec.yaml

      - name: Generate CHANGELOG.md from GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          # `gh release list` does NOT expose the body field; fetch the full
          # release objects via the REST API (newest first by default) which
          # does include `body`. Render them as a Keep-a-Changelog-style file.
          # The current tag MUST have a corresponding GitHub Release - create
          # one with `gh release create vX.Y.Z --generate-notes` before
          # pushing the tag.
          gh api --paginate "repos/${REPO}/releases" \
            --jq '.[] | select(.draft|not)
                  | [.tag_name, (.body // ""), .published_at] | @tsv' \
            > releases.tsv
          if ! awk -F'\t' -v t="$TAG" '$1==t{found=1} END{exit !found}' releases.tsv; then
            echo "::error::No GitHub Release found for tag $TAG."
            echo "::error::Create one first: gh release create $TAG --generate-notes"
            exit 1
          fi
          {
            echo "# Changelog"
            echo
            while IFS=$'\t' read -r tag body published; do
              [ -z "$tag" ] && continue
              v="${tag#v}"
              echo "## ${v} - ${published%T*}"
              echo
              if [ -n "$body" ]; then
                # Unescape \r\n that the API returns inside the TSV cell.
                printf '%b\n\n' "$body"
              else
                echo "_No release notes._"
                echo
              fi
            done < releases.tsv
          } > CHANGELOG.md
          rm -f releases.tsv
          echo "----- generated CHANGELOG.md -----"
          head -40 CHANGELOG.md

      - uses: dart-lang/setup-dart@v1   # provides OIDC PUB_TOKEN for publishing
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Publish
        run: flutter pub publish --force
